default_profile: linear
profiles:
  linear:
    tracker:
      type: linear
      linear:
        scope:
          workspace: flexsentlabs
        auth:
          token_env: LINEAR_API_KEY
  github:
    tracker:
      type: github
      github:
        scope:
          owner: ajdevy
          repo: semantaix
        auth:
          token_env: GITHUB_TOKEN
agent:
  backend: claude
  model: opus
  concurrency: 1
  runner_timeout: 2h
  watchdog_timeout: 10m
  watchdog_interval: 5s
  retry_budget: 5
