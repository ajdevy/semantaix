services:
  # Self-hosted Telegram Bot API server.
  # Lifts the `getFile` size cap from 20 MB (cloud) to 2 GB (local). When
  # enabled, set TELEGRAM_BOT_API_BASE_URL=http://telegram_bot_api:8081 and
  # TELEGRAM_BOT_API_LOCAL_MODE=true in .env. Disabled by default — comment
  # out this block (and the depends_on / volume mount on api & bot_gateway)
  # to fall back to api.telegram.org.
  #
  # Requires TELEGRAM_API_ID and TELEGRAM_API_HASH from https://my.telegram.org.
  # One-time migration step BEFORE first start with the new server:
  #   curl "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/logOut"
  # See https://github.com/tdlib/telegram-bot-api for details.
  telegram_bot_api:
    image: aiogram/telegram-bot-api:latest
    profiles: ["local-bot-api"]
    environment:
      TELEGRAM_API_ID: ${TELEGRAM_API_ID}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH}
      TELEGRAM_LOCAL: 1
      TELEGRAM_STAT: 1
    volumes:
      - telegram_bot_api_data:/var/lib/telegram-bot-api
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8081/health || exit 0"]
      interval: 15s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    env_file: .env
    volumes:
      - operator_uploads:/app/.data/operator_uploads
      - whisper_cache:/app/.cache/whisper
      - telegram_bot_api_data:/var/lib/telegram-bot-api
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/live')"]
      interval: 15s
      timeout: 3s
      retries: 3

  web_ui:
    build:
      context: .
      dockerfile: services/web_ui/Dockerfile
    env_file: .env
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health/live')"]
      interval: 15s
      timeout: 3s
      retries: 3

  bot_gateway:
    build:
      context: .
      dockerfile: services/bot_gateway/Dockerfile
    env_file: .env
    volumes:
      - operator_uploads:/app/.data/operator_uploads
      - telegram_bot_api_data:/var/lib/telegram-bot-api
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8002/health/live')"]
      interval: 15s
      timeout: 3s
      retries: 3

  ingest_worker:
    build:
      context: .
      dockerfile: services/ingest_worker/Dockerfile
    env_file: .env
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8003/health/live')"]
      interval: 15s
      timeout: 3s
      retries: 3

  scheduler:
    build:
      context: .
      dockerfile: services/scheduler/Dockerfile
    env_file: .env
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8004/health/live')"]
      interval: 15s
      timeout: 3s
      retries: 3

  qdrant:
    image: qdrant/qdrant:v1.13.2
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:6333/"]
      interval: 15s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    profiles: ["with-postgres"]
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: semantaix
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d semantaix"]
      interval: 15s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      api:
        condition: service_healthy
      web_ui:
        condition: service_healthy
      bot_gateway:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health/live"]
      interval: 15s
      timeout: 3s
      retries: 3

volumes:
  qdrant_data:
  postgres_data:
  operator_uploads:
  whisper_cache:
  telegram_bot_api_data:
