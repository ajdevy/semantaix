services:
  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    env_file: .env
    volumes:
      - operator_uploads:/app/.data/operator_uploads
      - whisper_cache:/app/.cache/whisper
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/live')"]
      interval: 15s
      timeout: 3s
      retries: 3

  web_ui:
    build:
      context: .
      dockerfile: services/web_ui/Dockerfile
    env_file: .env
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health/live')"]
      interval: 15s
      timeout: 3s
      retries: 3

  bot_gateway:
    build:
      context: .
      dockerfile: services/bot_gateway/Dockerfile
    env_file: .env
    volumes:
      - operator_uploads:/app/.data/operator_uploads
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8002/health/live')"]
      interval: 15s
      timeout: 3s
      retries: 3

  ingest_worker:
    build:
      context: .
      dockerfile: services/ingest_worker/Dockerfile
    env_file: .env
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8003/health/live')"]
      interval: 15s
      timeout: 3s
      retries: 3

  scheduler:
    build:
      context: .
      dockerfile: services/scheduler/Dockerfile
    env_file: .env
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8004/health/live')"]
      interval: 15s
      timeout: 3s
      retries: 3

  qdrant:
    image: qdrant/qdrant:v1.13.2
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:6333/"]
      interval: 15s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    profiles: ["with-postgres"]
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: semantaix
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d semantaix"]
      interval: 15s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      api:
        condition: service_healthy
      web_ui:
        condition: service_healthy
      bot_gateway:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health/live"]
      interval: 15s
      timeout: 3s
      retries: 3

volumes:
  qdrant_data:
  postgres_data:
  operator_uploads:
  whisper_cache:
